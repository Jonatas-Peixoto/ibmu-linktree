<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>IBMU • Links</title>
        <meta name="description" content="Links oficiais da IBMU (Igreja Batista Memorial Unida)" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./style.css" />
    </head>

    <body>
        <main class="wrap">
            <header class="header">
                <div class="logo-wrap">
                    <img class="logo" src="./assets/logo.png" alt="Logo da IBMU" />
                </div>
                <h1 class="title">IBMU</h1>
                <p class="subtitle">Igreja Batista Memorial Unida</p>
            </header>

            <section class="links" aria-label="Links principais">
                <a class="btn" href="https://www.ibmu.com.br/" target="_blank">
                    <img class="icon-img" src="./assets/logo.png">
                  SITE OFICIAL  
                </a>

                <a class="btn" href="https://www.instagram.com/memorialunida" target="_blank">
                    <img class="icon-img" src="./assets/instagram.png">
                    Instagram oficial
                </a>

                <a class="btn" href="https://www.instagram.com/parusiajuventude/" target="_blank">
                    <img class="icon-img" src="./assets/instagram.png">
                    Instagram Juventude Parusia
                </a>

                <a class="btn" href="https://www.youtube.com/memorialunida" target="_blank">
                    <img class="icon-img" src="./assets/youtube.png">
                    YOUTUBE
                </a>

                <a class="btn" href="https://www.ibmu.com.br/fale-conosco" target="_blank" rel="noopener noreferrer">
                    💬 fale-conosco
                </a>
            </section>

            <footer class="footer">
                <p class="note">"Experimente o cuidado que faz a diferença."</p>
            </footer>
        </main>

        <script src="./app.js"></script>
    </body>
</html>
